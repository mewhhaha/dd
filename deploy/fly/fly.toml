app = "dd-private-8956e096"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  BIND_PUBLIC_ADDR = "0.0.0.0:8080"
  BIND_PRIVATE_ADDR = "[::]:8081"
  PUBLIC_BASE_DOMAIN = "wdyt.chat"
  DD_RUNTIME_MAX_GLOBAL_ISOLATES = "1"
  DD_RUNTIME_MAX_ISOLATES_PER_WORKER = "8"
  DD_RUNTIME_MAX_INFLIGHT_PER_ISOLATE = "4"
  DD_RUNTIME_MIN_ISOLATES_PER_WORKER = "0"
  DD_MEMORY_OUTBOX_MAX_CONCURRENT_SHARDS = "1"
  DD_MEMORY_DB_CACHE_MAX_OPEN = "256"
  DD_MEMORY_DB_READ_CONNECTIONS_PER_DATABASE = "2"
  DD_MEMORY_DB_MAX_TOTAL_CONNECTIONS = "256"
  RUST_LOG = "info"

[http_service]
  internal_port = 8080
  force_https = false
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1

[checks]
  [checks.dd_tcp]
    type = "tcp"
    port = 8080
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"

[[mounts]]
  source = "dd_store"
  destination = "/app/store"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
